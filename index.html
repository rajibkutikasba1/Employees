<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <title>Hospital Entry</title>
</head>
<body>
    <h2>রোগীর তথ্য এন্ট্রি</h2>
    <form id="patientForm">
        <input type="text" id="nid" placeholder="NID নম্বর" required><br><br>
        <input type="text" id="name" placeholder="রোগীর নাম" required><br><br>
        <input type="text" id="mobile" placeholder="মোবাইল নম্বর" required><br><br>
        <button type="submit">সেভ করুন</button>
    </form>

    <script>
        document.getElementById('patientForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const data = {
                nid: document.getElementById('nid').value,
                name: document.getElementById('name').value,
                mobile: document.getElementById('mobile').value
            };
            const response = await fetch('/add-patient', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(data)
            });
            if(response.ok) alert("সফলভাবে ডাটা সেভ হয়েছে!");
            else alert("এরর হয়েছে!");
        });
    </script>
</body>
</html>
