<!DOCTYPE html>
<html>
<head>
    <style>
        @media print { .no-print { display: none !important; } }
        .card { border: 2px solid #000; padding: 20px; width: 300px; }
    </style>
</head>
<body>
    <div class="no-print">
        <h2>তথ্য এন্ট্রি</h2>
        <input type="text" id="nid" placeholder="আইডি"><br>
        <input type="text" id="name" placeholder="নাম"><br>
        <input type="text" id="country" placeholder="দেশ"><br>
        <input type="text" id="mobile" placeholder="মোবাইল"><br>
        <input type="text" id="passport" placeholder="পাসপোর্ট"><br>
        <input type="text" id="profession" placeholder="প্রফেশন"><br>
        <input type="file" id="imgFile" onchange="readImg()">
        <button onclick="save()">সেভ করুন</button>
        <hr>
        <h2>সার্চ করুন</h2>
        <input type="text" id="searchId">
        <button onclick="search()">খুঁজুন</button>
    </div>
    <div id="result"></div>
    <script>
        let imgData = "";
        function readImg() {
            let reader = new FileReader();
            reader.onload = e => imgData = e.target.result;
            reader.readAsDataURL(document.getElementById('imgFile').files[0]);
        }
        async function save() {
            let data = { nid: document.getElementById('nid').value, name: document.getElementById('name').value, country: document.getElementById('country').value, mobile: document.getElementById('mobile').value, passport: document.getElementById('passport').value, profession: document.getElementById('profession').value, image: imgData };
            await fetch('/add-record', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(data) });
            alert("সফল!");
        }
        async function search() {
            let id = document.getElementById('searchId').value;
            let res = await fetch(`/search?nid=${id}`);
            let d = await res.json();
            document.getElementById('result').innerHTML = `
            <div class="card">
                <img src="${d.image_url}" width="100"><br>
                <table>
                    <tr><td>নাম:</td><td>${d.name}</td></tr>
                    <tr><td>দেশ:</td><td>${d.country}</td></tr>
                    <tr><td>মোবাইল:</td><td>${d.mobile}</td></tr>
                    <tr><td>পাসপোর্ট:</td><td>${d.passport}</td></tr>
                    <tr><td>পেশা:</td><td>${d.profession}</td></tr>
                </table>
                <img src="https://barcode.tec-it.com/barcode.ashx?data=${d.nid}&code=Code128" width="200">
                <br><button class="no-print" onclick="window.print()">প্রিন্ট কার্ড</button>
            </div>`;
        }
    </script>
</body>
</html>
