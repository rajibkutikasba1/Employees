<!DOCTYPE html>
<html>
<head>
    <style>
        /* প্রিন্ট করার সময় যা যা লুকানো দরকার */
        @media print { .no-print { display: none !important; } }
        .card { border: 2px solid #000; padding: 20px; width: 300px; margin: auto; }
    </style>
</head>
<body>
    <div class="no-print">
        <h2>Employee Entry</h2>
        <input id="nid" placeholder="NID/ID Number"><br>
        <input id="name" placeholder="Full Name"><br>
        <input id="country" placeholder="Country"><br>
        <input id="mobile" placeholder="Mobile"><br>
        <input id="passport" placeholder="Passport"><br>
        <input id="profession" placeholder="Profession"><br>
        <input type="file" id="imgFile"><br>
        <button onclick="save()">Save Data</button>
        <hr>
        <h2>Search Employee</h2>
        <input id="searchId" placeholder="Enter ID">
        <button onclick="search()">Search</button>
    </div>
    <div id="result"></div>

    <script>
        let imgData = "";
        document.getElementById('imgFile').onchange = function() {
            let reader = new FileReader();
            reader.onload = e => imgData = e.target.result;
            reader.readAsDataURL(this.files[0]);
        };
        async function save() {
            let data = { nid: document.getElementById('nid').value, name: document.getElementById('name').value, country: document.getElementById('country').value, mobile: document.getElementById('mobile').value, passport: document.getElementById('passport').value, profession: document.getElementById('profession').value, image: imgData };
            await fetch('/add-record', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(data) });
            alert("Data Saved Successfully!");
        }
        async function search() {
            let id = document.getElementById('searchId').value;
            let res = await fetch(`/search?nid=${id}`);
            let d = await res.json();
            if(d) {
                // কিউআর কোডে সিস্টেম লিঙ্ক দেওয়া হয়েছে
                let qrUrl = `https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=http://employees-nrwh.onrender.com/?nid=${d.nid}`;
                document.getElementById('result').innerHTML = `
                <div class="card">
                    <img src="${d.image_url}" width="100"><br>
                    <p><b>ID:</b> ${d.nid}</p> <p><b>Name:</b> ${d.name}</p> <p><b>Country:</b> ${d.country}</p> 
                    <p><b>Mobile:</b> ${d.mobile}</p> <p><b>Passport:</b> ${d.passport}</p> <p><b>Profession:</b> ${d.profession}</p>
                    <img src="${qrUrl}" width="150">
                    <br><button class="no-print" onclick="window.print()">Print Card</button>
                </div>`;
            } else { alert("Employee not found!"); }
        }
    </script>
</body>
</html>
