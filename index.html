<!DOCTYPE html>
<html>
<head>
    <style>
        @media print { .no-print { display: none !important; } }
        .card { border: 2px solid #000; padding: 20px; width: 350px; margin: 20px; }
    </style>
</head>
<body>
    <div class="no-print">
        <h2>এমপ্লয়ি এন্ট্রি</h2>
        <input id="nid" placeholder="আইডি"><br>
        <input id="name" placeholder="নাম"><br>
        <input id="country" placeholder="দেশ"><br>
        <input id="mobile" placeholder="মোবাইল"><br>
        <input id="passport" placeholder="পাসপোর্ট"><br>
        <input id="profession" placeholder="পেশা"><br>
        <input type="file" id="imgFile"><br>
        <button onclick="save()">সেভ করুন</button>
        <hr>
        <input id="searchId" placeholder="আইডি লিখে খুঁজুন">
        <button onclick="search()">খুঁজুন</button>
    </div>
    <div id="result"></div>

    <script>
        let imgData = "";
        document.getElementById('imgFile').onchange = function() {
            let reader = new FileReader();
            reader.onload = e => imgData = e.target.result;
            reader.readAsDataURL(this.files[0]);
        };
        async function save() {
            let data = { nid: document.getElementById('nid').value, name: document.getElementById('name').value, country: document.getElementById('country').value, mobile: document.getElementById('mobile').value, passport: document.getElementById('passport').value, profession: document.getElementById('profession').value, image: imgData };
            await fetch('/add-record', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(data) });
            alert("সেভ হয়েছে!");
        }
        async function search() {
            let id = document.getElementById('searchId').value;
            let res = await fetch(`/search?nid=${id}`);
            let d = await res.json();
            if(d) {
                document.getElementById('result').innerHTML = `
                <div class="card">
                    <img src="${d.image_url}" width="100"><br>
                    <p>আইডি: ${d.nid}</p> <p>নাম: ${d.name}</p> <p>দেশ: ${d.country}</p> 
                    <p>মোবাইল: ${d.mobile}</p> <p>পাসপোর্ট: ${d.passport}</p> <p>পেশা: ${d.profession}</p>
                    <img src="https://barcode.tec-it.com/barcode.ashx?data=${d.nid}&code=Code128" width="200">
                    <br><button class="no-print" onclick="window.print()">প্রিন্ট</button>
                </div>`;
            } else { alert("তথ্য পাওয়া যায়নি!"); }
        }
    </script>
</body>
</html>
