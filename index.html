<!DOCTYPE html>
<html lang="bn">
<head>
    <style>
        /* প্রিন্ট করার সময় যা যা লুকানো দরকার */
        @media print {
            .no-print { display: none !important; }
            #cardResult { display: block !important; }
        }
        .card { border: 2px solid #000; padding: 20px; width: 350px; }
    </style>
</head>
<body>
    <div class="no-print">
        <h2>এমপ্লয়ি এন্ট্রি</h2>
        <form id="empForm">
            <input type="text" name="nid" placeholder="আইডি নাম্বার" required><br>
            <input type="text" name="name" placeholder="নাম" required><br>
            <input type="text" name="image_url" placeholder="ছবির লিঙ্ক (URL)"><br>
            <button type="submit">সেইভ করুন</button>
        </form>
        <hr>
        <h2>এমপ্লয়ি খুঁজুন</h2>
        <input type="text" id="searchNid" placeholder="আইডি লিখুন">
        <button onclick="searchEmp()">খুঁজুন</button>
    </div>

    <div id="cardResult"></div>

    <script>
        async function searchEmp() {
            const nid = document.getElementById('searchNid').value;
            const res = await fetch(`/search?nid=${nid}`);
            const data = await res.json();
            if (data) {
                document.getElementById('cardResult').innerHTML = `
                    <div class="card">
                        <img src="${data.image_url}" width="100" height="100" style="border:1px solid #000;">
                        <h3>${data.name}</h3>
                        <p>ID: ${data.nid}</p>
                        <img src="https://barcode.tec-it.com/barcode.ashx?data=${data.nid}&code=Code128&multiplebarcodes=false" width="200">
                        <br><button class="no-print" onclick="window.print()">প্রিন্ট করুন</button>
                    </div>
                `;
            }
        }
    </script>
</body>
</html>
