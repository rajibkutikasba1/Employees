<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .no-print { width: 400px; padding: 20px; border: 1px solid #ddd; background: #f4f4f4; border-radius: 8px; }
        .card-view { border: 2px solid #000; padding: 20px; margin-top: 20px; width: 350px; }
        @media print { .no-print { display: none; } }
    </style>
</head>
<body>

<div class="no-print">
    <h2>তথ্য এন্ট্রি</h2>
    <input type="text" id="nid" placeholder="আইডি" style="width:100%"><br><br>
    <input type="text" id="name" placeholder="নাম" style="width:100%"><br><br>
    <input type="text" id="country" placeholder="দেশ" style="width:100%"><br><br>
    <input type="text" id="mobile" placeholder="মোবাইল" style="width:100%"><br><br>
    <input type="text" id="passport" placeholder="পাসপোর্ট" style="width:100%"><br><br>
    <input type="text" id="profession" placeholder="পেশা" style="width:100%"><br><br>
    <input type="file" id="imgFile"><br><br>
    <button onclick="save()" style="width:100%; padding:10px; background:blue; color:white;">সেভ করুন</button>
</div>

<div style="margin-top:20px;">
    <input type="text" id="searchId" placeholder="আইডি লিখুন">
    <button onclick="search()">সার্চ করুন</button>
</div>

<div id="result"></div>

<script>
    let imgData = "";
    document.getElementById('imgFile').onchange = function() {
        let reader = new FileReader();
        reader.onload = e => imgData = e.target.result;
        reader.readAsDataURL(this.files[0]);
    };

    async function save() {
        let payload = {
            nid: document.getElementById('nid').value,
            name: document.getElementById('name').value,
            country: document.getElementById('country').value,
            mobile: document.getElementById('mobile').value,
            passport: document.getElementById('passport').value,
            profession: document.getElementById('profession').value,
            image: imgData
        };
        await fetch('/add-record', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(payload) });
        alert("ডাটা সেভ হয়েছে!");
    }

    async function search() {
        let id = document.getElementById('searchId').value;
        let res = await fetch(`/search?nid=${id}`);
        let d = await res.json();
        if(d) {
            document.getElementById('result').innerHTML = `
            <div class="card-view">
                <img src="${d.image_url}" width="100"><br>
                <p>আইডি: ${d.nid}</p>
                <p>নাম: ${d.name}</p>
                <p>দেশ: ${d.country}</p>
                <p>মোবাইল: ${d.mobile}</p>
                <p>পাসপোর্ট: ${d.passport}</p>
                <p>পেশা: ${d.profession}</p>
                <img src="https://barcode.tec-it.com/barcode.ashx?data=${d.nid}&code=Code128" width="200">
                <br><button class="no-print" onclick="window.print()">প্রিন্ট করুন</button>
            </div>`;
        }
    }
</script>
</body>
</html>
