<!DOCTYPE html>
<html>
<head>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f0f2f5; text-align: center; padding: 20px; }
        .no-print { background: #ffffff; width: 400px; margin: auto; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h2 { color: #2c3e50; }
        button { background-color: #3498db; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; transition: 0.3s; }
        button:hover { background-color: #2980b9; }
        .card { border: 3px solid #3498db; padding: 25px; width: 350px; margin: 30px auto; border-radius: 15px; background: #fff; box-shadow: 0 6px 20px rgba(0,0,0,0.15); }
        .card h3 { color: #2c3e50; font-size: 24px; }
        .card p { font-size: 16px; color: #555; }
        @media print { .no-print { display: none !important; } }
    </style>
</head>
<body>
    <div class="no-print">
        <img src="https://i.ibb.co/hxHR0pbY/17813608134851349478934355537905.jpg" width="120">
        <h2>Employee Portal</h2>
        <input id="nid" placeholder="ID"><br>
        <input id="name" placeholder="Name"><br>
        <input id="country" placeholder="Country"><br>
        <input id="mobile" placeholder="Mobile"><br>
        <input id="passport" placeholder="Passport"><br>
        <input id="profession" placeholder="Profession"><br>
        <input type="file" id="imgFile"><br><br>
        <button onclick="save()">Save Information</button>
        <hr>
        <input id="searchId" placeholder="Search by ID">
        <button onclick="search()">Search</button>
    </div>
    <div id="result"></div>

    <script>
        let imgData = "";
        document.getElementById('imgFile').onchange = function() {
            let reader = new FileReader();
            reader.onload = e => imgData = e.target.result;
            reader.readAsDataURL(this.files[0]);
        };
        async function save() {
            let data = { nid: document.getElementById('nid').value, name: document.getElementById('name').value, country: document.getElementById('country').value, mobile: document.getElementById('mobile').value, passport: document.getElementById('passport').value, profession: document.getElementById('profession').value, image: imgData };
            await fetch('/add-record', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(data) });
            alert("Data Saved Successfully!");
        }
