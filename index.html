<!DOCTYPE html>
<html>
<head>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f0f2f5; text-align: center; padding: 20px; }
        .no-print { background: #ffffff; width: 400px; margin: auto; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        input { width: 90%; padding: 8px; margin: 5px 0; border: 1px solid #ccc; border-radius: 5px; }
        button { background-color: #3498db; color: white; border: none; padding: 12px 25px; border-radius: 5px; cursor: pointer; margin-top: 10px; }
        .card { border: 3px solid #3498db; padding: 25px; width: 350px; margin: 30px auto; border-radius: 15px; background: #fff; box-shadow: 0 6px 20px rgba(0,0,0,0.15); }
        @media print { .no-print { display: none !important; } }
    </style>
</head>
<body>
    <div class="no-print">
        <img src="https://i.ibb.co/hxHR0pbY/17813608134851349478934355537905.jpg" width="120">
        <h2>Employee Portal</h2>
        <input id="nid" placeholder="ID Number"><br>
        <input id="name" placeholder="Full Name"><br>
        <input id="country" placeholder="Country"><br>
        <input id="mobile" placeholder="Mobile Number"><br>
        <input id="passport" placeholder="Passport Number"><br>
        <input id="profession" placeholder="Profession"><br>
        <input type="file" id="imgFile"><br>
        <button onclick="save()">Save Information</button>
        <hr>
        <input id="searchId" placeholder="Search by ID">
        <button onclick="search()">Search</button>
    </div>
    <div id="result"></div>

    <script>
        let imgData = "";
        document.getElementById('imgFile').onchange = function() {
            let reader = new FileReader();
            reader.onload = e => imgData = e.target.result;
            reader.readAsDataURL(this.files[0]);
        };

        async function save() {
            let data = { 
                nid: document.getElementById('nid').value, 
                name: document.getElementById('name').value, 
                country: document.getElementById('country').value, 
                mobile: document.getElementById('mobile').value, 
                passport: document.getElementById('passport').value, 
                profession: document.getElementById('profession').value, 
                image: imgData 
            };
            
            let res = await fetch('/add-record', { 
                method: 'POST', 
                headers: {'Content-Type': 'application/json'}, 
                body: JSON.stringify(data) 
            });
            
            if(res.ok) alert("Data Saved Successfully!");
            else alert("Error! Please try again.");
        }

        async function search() {
            let id = document.getElementById('searchId').value;
            let res = await fetch(`/search?nid=${id}`);
            let d = await res.json();
            if(d) {
                document.getElementById('result').innerHTML = `
                <div class="card">
                    <img src="https://i.ibb.co/hxHR0pbY/17813608134851349478934355537905.jpg" width="80">
                    <img src="${d.image_url}" width="120" style="border:3px solid #3498db; border-radius:10px;">
                    <h3>${d.name}</h3>
                    <p><b>ID:</b> ${d.nid}</p>
                    <p><b>Country:</b> ${d.country}</p>
                    <p><b>Mobile:</b> ${d.mobile}</p>
                    <p><b>Passport:</b> ${d.passport}</p>
                    <p><b>Profession:</b> ${d.profession}</p>
                    <img src="https://api.qrserver.com/v1/create-qr-code/?data=http://employees-nrwh.onrender.com/?nid=${d.nid}" width="120">
                    <br><br><button onclick="window.print()">Print Card</button>
                </div>`;
            } else { alert("Employee Not Found!"); }
        }
    </script>
</body>
</html>
