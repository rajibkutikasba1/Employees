<!DOCTYPE html>
<html>
<head>
    <style>
        @media print { .no-print { display: none !important; } }
        .card { border: 2px solid #000; padding: 20px; width: 300px; }
    </style>
</head>
<body>
    <div class="no-print">
        <h2>এমপ্লয়ি এন্ট্রি</h2>
        <input type="text" id="nid" placeholder="আইডি">
        <input type="text" id="name" placeholder="নাম">
        <input type="text" id="img" placeholder="ছবির লিঙ্ক">
        <button onclick="save()">সেভ</button>
        <hr>
        <h2>খুঁজুন</h2>
        <input type="text" id="searchId">
        <button onclick="search()">সার্চ</button>
    </div>
    <div id="result"></div>

    <script>
        async function save() {
            const data = { nid: document.getElementById('nid').value, name: document.getElementById('name').value, image_url: document.getElementById('img').value };
            await fetch('/add-record', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(data) });
            alert("সেভ হয়েছে!");
        }
        async function search() {
            const id = document.getElementById('searchId').value;
            const res = await fetch(`/search?nid=${id}`);
            const data = await res.json();
            if(data) {
                document.getElementById('result').innerHTML = `
                <div class="card">
                    <img src="${data.image_url}" width="100">
                    <h3>${data.name}</h3>
                    <img src="https://barcode.tec-it.com/barcode.ashx?data=${data.nid}&code=Code128" width="200">
                    <p>ID: ${data.nid}</p>
                    <button class="no-print" onclick="window.print()">প্রিন্ট</button>
                </div>`;
            }
        }
    </script>
</body>
</html>
