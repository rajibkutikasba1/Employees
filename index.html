<!DOCTYPE html>
<html lang="bn">
<body>
    <h2>নতুন এমপ্লয়ি এন্ট্রি</h2>
    <form id="empForm">
        <input type="text" name="nid" placeholder="আইডি নাম্বার" required><br>
        <input type="text" name="name" placeholder="নাম" required><br>
        <input type="text" name="country" placeholder="দেশ"><br>
        <input type="text" name="mobile" placeholder="মোবাইল নাম্বার"><br>
        <input type="text" name="passport" placeholder="পাসপোর্ট নাম্বার"><br>
        <input type="text" name="profession" placeholder="প্রফেশন"><br>
        <input type="text" name="image_url" placeholder="ছবির লিঙ্ক (URL)"><br>
        <button type="submit">সেইভ করুন</button>
    </form>

    <hr>
    <h2>এমপ্লয়ি খুঁজুন (আইডি দিয়ে)</h2>
    <input type="text" id="searchNid" placeholder="আইডি লিখুন">
    <button onclick="searchEmp()">খুঁজুন</button>
    <div id="result"></div>

    <script>
        document.getElementById('empForm').onsubmit = async (e) => {
            e.preventDefault();
            const data = Object.fromEntries(new FormData(e.target));
            await fetch('/add-record', { 
                method: 'POST', 
                headers: {'Content-Type': 'application/json'}, 
                body: JSON.stringify(data) 
            });
            alert("সফলভাবে সেভ হয়েছে!");
        };

        async function searchEmp() {
            const nid = document.getElementById('searchNid').value;
            const res = await fetch(`/search?nid=${nid}`);
            const data = await res.json();
            if (data) {
                document.getElementById('result').innerHTML = `
                    <h3>নাম: ${data.name}</h3>
                    <p>দেশ: ${data.country} | মোবাইল: ${data.mobile}</p>
                    <p>পাসপোর্ট: ${data.passport} | প্রফেশন: ${data.profession}</p>
                    <img src="${data.image_url}" width="100"><br>
                    <img src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=${data.nid}">
                    <br><button onclick="window.print()">প্রিন্ট কার্ড</button>
                `;
            } else {
                alert("তথ্য পাওয়া যায়নি!");
            }
        }
    </script>
</body>
</html>
