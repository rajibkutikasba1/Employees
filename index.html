<script>
    // আপনি যখন লগইন করবেন, তখন এই ফাংশনটি দিয়ে সব ডাটা দেখবেন
    async function showAllUsers() {
        let res = await fetch('/all-users');
        let users = await res.json();
        let html = "<h3>All Users List</h3><table border='1'>";
        users.forEach(u => {
            html += `<tr><td>${u.nid}</td><td>${u.name}</td><td>${u.country}</td></tr>`;
        });
        html += "</table>";
        document.getElementById('result').innerHTML = html;
    }
</script>

<button onclick="showAllUsers()">View All Users (Admin)</button>
