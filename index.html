<!DOCTYPE html>
<html lang="bn">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; background-color: #f4f4f9; }
        .form-container { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); max-width: 500px; margin: auto; }
        h2 { text-align: center; color: #333; }
        input { width: 100%; padding: 15px; margin: 10px 0; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        button { width: 100%; padding: 15px; background-color: #28a745; color: white; border: none; border-radius: 8px; font-size: 18px; cursor: pointer; }
        button:hover { background-color: #218838; }
    </style>
</head>
<body>

<div class="form-container">
    <h2>তথ্য এন্ট্রি ফর্ম</h2>
    <form id="dataForm">
        <input type="text" name="nid" placeholder="এনআইডি নাম্বার" required>
        <input type="text" name="name" placeholder="নাম" required>
        <input type="text" name="father_name" placeholder="পিতার নাম">
        <input type="text" name="mother_name" placeholder="মাতার নাম">
        <input type="text" name="village" placeholder="গ্রাম">
        <input type="text" name="mobile" placeholder="মোবাইল নাম্বার">
        <button type="submit">সেভ করুন</button>
    </form>
</div>

<script>
    document.getElementById('dataForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const data = Object.fromEntries(new FormData(e.target));
        const res = await fetch('/add-record', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(data)
        });
        if (res.ok) alert("সফলভাবে সেভ হয়েছে!");
        else alert("এরর হয়েছে!");
    });
</script>

</body>
</html>
