<!DOCTYPE html>
<html lang="bn">
<head>
    <style>
        @media print { .no-print { display: none !important; } .card { border: 2px solid #000; padding: 20px; } }
        table { width: 100%; border-collapse: collapse; }
        td { border: 1px solid #ccc; padding: 8px; }
    </style>
</head>
<body>
    <div class="no-print">
        <h2>এমপ্লয়ি এন্ট্রি</h2>
        <input type="text" id="nid" placeholder="আইডি">
        <input type="text" id="name" placeholder="নাম">
        <video id="video" width="200" autoplay></video>
        <button onclick="startCamera()">ক্যামেরা অন</button>
        <canvas id="canvas" style="display:none;"></canvas>
        <button onclick="save()">সেভ</button>
    </div>

    <div id="result"></div>

    <script>
        async function startCamera() {
            const stream = await navigator.mediaDevices.getUserMedia({ video: true });
            document.getElementById('video').srcObject = stream;
        }

        async function save() {
            // ক্যামেরা থেকে ছবি নেয়া
            const canvas = document.getElementById('canvas');
            const video = document.getElementById('video');
            canvas.getContext('2d').drawImage(video, 0, 0, 200, 150);
            const image_url = canvas.toDataURL('image/png');
            
            // ডাটা সেভ করার কোড
            alert("সফলভাবে সেভ হয়েছে!");
        }

        async function search() {
            // ডাটা সার্চ করে টেবিল আকারে দেখানোর কোড

        }
    </script>
</body>
</html>
