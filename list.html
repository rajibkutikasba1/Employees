<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <title>সব ডাটা দেখুন</title>
</head>
<body>
    <h2>সেভ করা তথ্যসমূহ:</h2>
    <div id="dataList">লোডিং হচ্ছে...</div>

    <script>
        async function loadData() {
            const res = await fetch('/get-records'); // সার্ভার থেকে ডাটা আনবে
            const data = await res.json();
            document.getElementById('dataList').innerHTML = JSON.stringify(data, null, 2);
        }
        loadData();
    </script>
</body>
</html>
