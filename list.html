<!DOCTYPE html>
<html lang="bn">
<head>
    <style>
        .container { display: flex; flex-wrap: wrap; padding: 20px; }
        .employee-card { background: white; border-radius: 15px; padding: 20px; width: 300px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); margin: 10px; }
    </style>
</head>
<body>
    <div id="cardContainer" class="container">লোড হচ্ছে...</div>

    <script>
        async function fetchEmployees() {
            const res = await fetch('/all-records'); // আপনার সার্ভার থেকে ডাটা আনছে
            const employees = await res.json();
            const container = document.getElementById('cardContainer');
            container.innerHTML = ''; // খালি করা

            employees.forEach(emp => {
                const card = document.createElement('div');
                card.className = 'employee-card';
                card.innerHTML = `
                    <h3>${emp.name}</h3>
                    <p>আইডি: ${emp.nid}</p>
                    <p>মোবাইল: ${emp.mobile}</p>
                `;
                container.appendChild(card);
            });
        }
        fetchEmployees();
    </script>
</body>
</html>
